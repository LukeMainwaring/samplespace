services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: samplespace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - samplespace

  backend:
    build:
      context: ./backend
      target: local
    ports:
      - "8002:8002"
    environment:
      ENVIRONMENT: development
      UVICORN_PORT: 8002
      POSTGRES_DB: samplespace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SAMPLES_DIR: /app/data/samples
      SAMPLE_LIBRARY_DIR: ${SAMPLE_LIBRARY_DIR:+/app/sample-library}
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./data/samples:/app/data/samples
      - ${SAMPLE_LIBRARY_DIR:-/dev/null}:/app/sample-library:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - samplespace

networks:
  samplespace:
    attachable: true

volumes:
  postgres_data:
