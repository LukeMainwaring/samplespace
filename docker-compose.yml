services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: samplespace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - samplespace

  backend:
    build:
      context: ./backend
      target: local
    environment:
      ENVIRONMENT: development
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: samplespace
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./data/samples:/app/data/samples
    depends_on:
      db:
        condition: service_healthy
    networks:
      - samplespace

volumes:
  pgdata:

networks:
  samplespace:
